name: hat-in-ring

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: hat-in-ring
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: _hat-in-ring-src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: _hat-in-ring-src/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Ingest signals (FEC + news)
        env:
          FEC_API_KEY: ${{ secrets.FEC_API_KEY || 'DEMO_KEY' }}
        run: python -m hatring.pipeline --fec --news
      - name: Run tests
        run: pytest -q
      - name: Build dashboard at site root
        run: python -m hatring.pipeline --build --out ../index.html
      - name: Commit & push
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name  "hat-in-ring-bot"
          git config user.email "actions@users.noreply.github.com"
          git add _hat-in-ring-src/data index.html share.html assets sitemap.xml c feed.xml rss.xml
          if git diff --cached --quiet; then echo "no changes"; exit 0; fi
          git commit -m "chore: hat-in-ring daily ingest $(date -u +%F)"
          for i in 1 2 3 4 5; do
            git fetch -q origin main || true
            git rebase -X theirs origin/main && git push && { echo "pushed on try $i"; exit 0; }
            git rebase --abort 2>/dev/null || true
            echo "push race; retry $i"; sleep $((i * 4))
          done
          echo "commit/push failed after 5 retries"; exit 1
